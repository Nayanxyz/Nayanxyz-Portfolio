<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nayan | Software Engineer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="network-canvas"></canvas>

    <header id="hero">
        <h1 id="hero-line-1"></h1>
        <h2 id="hero-line-2"></h2>
        
        <div class="terminal-container">
            <span class="prompt">Nayanxyz :~$ </span>
            <span id="hero-terminal"></span>
            <span class="cursor">█</span>
        </div>
        
        <div class="hero-directory">
            <button class="dir-card" data-target="0">
                <span class="dir-title">Projects</span>
            </button>
            <button class="dir-card" data-target="1">
                <span class="dir-title">Education</span>
            </button>
            <button class="dir-card" data-target="2">
                <span class="dir-title">Certificates</span>
            </button>
            <button class="dir-card" data-target="3">
                <span class="dir-title">Social Connect</span>
            </button>
        </div>
        <h3 id="hero-line-3"></h3>

        <button id="scroll-down-btn" class="scroll-indicator" aria-label="Scroll to projects">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <polyline points="19 12 12 19 5 12"></polyline>
            </svg>
        </button>
    </header>

    <main>
        <section id="projects">
            <div id="scroll-hint" class="scroll-hint">
                <span>More Architecture Below</span>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <polyline points="19 12 12 19 5 12"></polyline>
                </svg>
            </div>
            
            <h2>Featured Architecture</h2>
            
            <div class="tab-navigation">
                <button class="tab-btn active">Projects</button>
                <button class="tab-btn">Education</button>
                <button class="tab-btn">Certificates</button>
                <button class="tab-btn">Social Connect</button>
            </div>
            
            <div class="slider-window">
                <div class="slider-track" id="slider-track">
                    
                    <div class="slider-panel">
                        <div id="project-grid"></div> 
                    </div>

                    <div class="slider-panel">
                        <div class="project-card">
                            <h3>Self Taught </h3>
                            <p>Completed multiple online courses and certifications in software development, data science, and cloud computing.</p>
                        </div>
                    </div>

                    <div class="slider-panel">
                        <div class="project-card">
                            <h3>Just wait ..</h3>
                            <p>we will have them </p>
                            <p>Unsupervised learning, recommenders, and automated data pipelines.</p>
                        </div>
                    </div>

                    <div class="slider-panel">
                        <div id="social-grid"></div>
                    </div>

                </div>
            </div>
            
            <div id="projects-bottom-anchor" style="height: 1px; width: 100%;"></div>
            
        </section>
    </main>

    <script src="particles.js"></script>
    <script src="script.js"></script>
</body>
</html>
